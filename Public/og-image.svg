<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">

  <!-- Background -->
  <rect width="1200" height="630" fill="#2C3A2D"/>

  <!-- THE COMPOST BANK -->
  <text x="90" y="178"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="36"
    font-weight="400"
    fill="#EDE8DF"
    letter-spacing="6">THE COMPOST BANK</text>

  <!-- WEALTH IN WASTE -->
  <text x="92" y="210"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="14"
    font-weight="400"
    fill="#B8875A"
    letter-spacing="4">WEALTH IN WASTE</text>

  <!-- Building infrastructure. -->
  <text x="90" y="358"
    font-family="Georgia-Italic, 'Times New Roman Italic', Georgia, serif"
    font-size="46"
    font-style="italic"
    font-weight="400"
    fill="#EDE8DF"
    opacity="0.82">Building infrastructure.</text>

  <!-- Creating value. -->
  <text x="90" y="412"
    font-family="Georgia-Italic, 'Times New Roman Italic', Georgia, serif"
    font-size="46"
    font-style="italic"
    font-weight="400"
    fill="#EDE8DF"
    opacity="0.82">Creating value.</text>

  <!-- Restoring balance. -->
  <text x="90" y="466"
    font-family="Georgia-Italic, 'Times New Roman Italic', Georgia, serif"
    font-size="46"
    font-style="italic"
    font-weight="400"
    fill="#EDE8DF"
    opacity="0.82">Restoring balance.</text>

</svg>